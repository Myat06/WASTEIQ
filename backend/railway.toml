[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && python manage.py seed_data && gunicorn wasteiq.wsgi --bind 0.0.0.0:$PORT --log-file -"
healthcheckPath = "/api/zones/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
